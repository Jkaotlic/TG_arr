# DEP-02: fully-resolved dependency lock (top-level + transitive) for
# reproducible Docker builds. Pins the EXACT versions that resolve on the prod
# platform (linux/arm64, CPython 3.12.13) so two builds on different days yield
# identical images and a fresh transitive release can't slip in unvetted.
#
# Generated from the live rpie4 container (the real build target), not the
# desktop, so every version here is known to have an arm64 wheel:
#   docker exec tg-arr-bot pip freeze --all | grep -viE '^(pip|setuptools|wheel)=='
#
# requirements.txt stays the human-readable source of the 8 top-level pins;
# regenerate this file after any bump there. No --require-hashes: exact-version
# pinning gives reproducibility without the multi-platform hash fragility that
# would break the arm64 build.
